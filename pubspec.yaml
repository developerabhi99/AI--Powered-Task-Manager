name: personal_task_manager
description: A premium personal task manager app built with Flutter.
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  uuid: ^4.3.3
  intl: ^0.19.0
  google_fonts: ^6.1.0
  flutter_local_notifications: ^17.1.2
  timezone: ^0.9.2
  flutter_timezone: ^5.1.0
  fl_chart: ^0.69.0
  image_picker: ^1.1.2
  shared_preferences: ^2.3.2
  pedometer: ^4.2.0
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/

